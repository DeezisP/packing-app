appId: com.packingrecorder.app
productName: PackingRecorder
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: node_modules/ffmpeg-static/ffmpeg.exe
    to: ffmpeg/ffmpeg.exe
  - from: config.default.json
    to: config.default.json
  - from: resources/icon.ico
    to: icon.ico
publish:
  - provider: github
    owner: DeezisP
    repo: packing-app
    # electron-builder defaults to creating a DRAFT release unless this is
    # set (see builder-util-runtime's publishOptions.d.ts: "@default draft",
    # and electron-publish's gitHubPublisher.js, which normally
    # auto-publishes/un-drafts once every asset upload for the run
    # finishes) - that follow-up step didn't complete for v1.7.9 (four rapid
    # back-to-back releases in one session), leaving it stuck as a draft:
    # invisible on the public releases page, no real git tag, every direct
    # download link 404s, and auto-update simply can't see it. `draft:
    # false` is NOT a recognized property in this electron-builder
    # version's config schema (confirmed - it fails validation outright);
    # `releaseType: release` is the actual supported knob and skips the
    # draft state entirely instead of depending on that follow-up step.
    releaseType: release
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PackingRecorder
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm
  - node_modules/@koromix/koffi-win32-x64/win32_x64/koffi.node
