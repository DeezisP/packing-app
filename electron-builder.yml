appId: com.packingrecorder.app
productName: PackingRecorder
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: node_modules/ffmpeg-static/ffmpeg.exe
    to: ffmpeg/ffmpeg.exe
  - from: config.default.json
    to: config.default.json
publish:
  - provider: github
    owner: DeezisP
    repo: packing-app
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PackingRecorder
asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm
